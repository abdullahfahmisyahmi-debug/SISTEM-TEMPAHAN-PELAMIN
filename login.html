<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register - Aril Swarovski</title>
    <style>
        :root {
            --primary-color: #8b6e4e; /* Warna tema coklat Aril Swarovski */
            --text-dark: #333;
            --bg-light: #fdfaf7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Bekas Utama */
        .main-wrapper {
            background: white;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 950px;
        }

        /* Tajuk Atas */
        .brand-title {
            text-align: center;
            color: var(--primary-color);
            letter-spacing: 4px;
            margin-bottom: 40px;
            font-size: 2em;
            text-transform: uppercase;
        }

        /* Layout Dua Kolum */
        .auth-container {
            display: flex;
            gap: 60px;
        }

        .auth-box {
            flex: 1;
        }

        h2 {
            font-size: 1.3em;
            border-bottom: 2px solid var(--primary-color);
            display: inline-block;
            margin-bottom: 25px;
            padding-bottom: 5px;
            color: var(--text-dark);
        }

        /* Gaya Form */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9em;
        }

        input[type="email"], 
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        /* Butang */
        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: black;
        }

        .lost-pw {
            display: block;
            margin-top: 15px;
            font-size: 0.85em;
            color: #666;
            text-decoration: none;
        }

        /* Teks Privasi */
        .info-text {
            font-size: 0.85em;
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .auth-container {
                flex-direction: column;
                gap: 40px;
            }
            .main-wrapper {
                padding: 30px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <h1 class="brand-title">ARILL SWAROVSKI</h1>

        <div class="auth-container">
            <div class="auth-box">
                <h2>LOGIN</h2>
                <form action="#">
                    <div class="form-group">
                        <label>Email Address *</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" required>
                    </div>
                    <div class="checkbox-container">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember Me</label>
                    </div>
                    <button type="submit" class="btn-submit">Log in</button>
                    <a href="#" class="lost-pw">Lost your password?</a>
                </form>
            </div>

            <div class="auth-box">
                <h2>REGISTER</h2>
                <form action="#">
                    <div class="form-group">
                        <label>Email Address *</label>
                        <input type="email" required>
                    </div>
                    <p class="info-text">
                        A link to set a new password will be sent to your email address.
                    </p>
                    <p class="info-text">
                        Your personal data will be used to support your experience throughout this website, 
                        to manage access to your account, and for other purposes described in our privacy policy.
                    </p>
                    <button type="submit" class="btn-submit">Register</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
