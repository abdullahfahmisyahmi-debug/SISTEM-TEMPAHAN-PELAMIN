<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Senarai Pelamin Mini</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding: 30px;
}

.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h3 {
  margin: 10px 0;
}

.card p {
  color: #666;
}

.btn {
  display: inline-block;
  margin: 10px;
  padding: 10px 20px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 20px;
}

.btn:hover {
  background: #444;
}
</style>

</head>
<body>

<h1>Senarai Pelamin Mini</h1>

<div class="container">

  <!-- Frame 1 -->
  <div class="card">
    <img src="pelamin1.jpg">
    <h3>Pelamin Classic</h3>
    <p>RM1500</p>
    <a href="#" class="btn">Tempah ➜</a>
  </div>

  <!-- Frame 2 -->
  <div class="card">
    <img src="pelamin2.jpg">
    <h3>Pelamin Garden</h3>
    <p>RM1800</p>
    <a href="#" class="btn">Tempah ➜</a>
  </div>

  <!-- Frame 3 -->
  <div class="card">
    <img src="pelamin3.jpg">
    <h3>Pelamin Modern</h3>
    <p>RM2000</p>
    <a href="#" class="btn">Tempah ➜</a>
  </div>

  <!-- Frame 4 -->
  <div class="card">
    <img src="pelamin4.jpg">
    <h3>Pelamin Luxury</h3>
    <p>RM2500</p>
    <a href="#" class="btn">Tempah ➜</a>
  </div>

  <!-- Frame 5 -->
  <div class="card">
    <img src="pelamin5.jpg">
    <h3>Pelamin Simple</h3>
    <p>RM1200</p>
    <a href="#" class="btn">Tempah ➜</a>
  </div>

  <!-- Frame 6 -->
  <div class="card">
    <img src="pelamin6.jpg">
    <h3>Pelamin Exclusive</h3>
    <p>RM3000</p>
    <a href="#" class="btn">Tempah ➜</a>
  </div>

</div>

</body>
</html>
